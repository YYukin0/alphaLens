name: deepequity

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: alphalens
      POSTGRES_PASSWORD: alphalens
      POSTGRES_DB: alphalens
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alphalens -d alphalens"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["api"]
    environment:
      DATABASE_URL: postgresql://alphalens:alphalens@postgres:5432/alphalens
      REDIS_URL: redis://redis:6379/0
      SEC_USER_AGENT: DeepEquity Research Platform contact@deepequity.local
      DEBUG: "false"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      AUTO_EXTRACT_EVENTS: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/tests:/app/tests
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["worker"]
    environment:
      DATABASE_URL: postgresql://alphalens:alphalens@postgres:5432/alphalens
      REDIS_URL: redis://redis:6379/0
      SEC_USER_AGENT: DeepEquity Research Platform contact@deepequity.local
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      AUTO_EXTRACT_EVENTS: "true"
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
